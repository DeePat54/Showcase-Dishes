<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Garpoo Daily Showcase</title>
  <style>
    body {
      background: linear-gradient(to right, #fff8e1, #ffe0b2);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
    }

    .showcase-container {
      width: min(980px, 92%);
      margin: 30px auto 40px;
      text-align: center;
    }

    .showcase-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 0 auto 24px;
      flex-wrap: wrap;
      background: rgba(255, 255, 255, 0.58);
      border-radius: 16px;
      padding: 12px 18px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
      max-width: 760px;
    }

    .showcase-logo {
      width: 155px;
      height: auto;
      display: block;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.12));
    }

    .showcase-title {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      color: #d84315;
      margin: 0;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .rack {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
    }

    .rack-left, .rack-right {
      display: grid;
      gap: 14px;
      width: 100%;
    }

    .dish {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.18);
      overflow: hidden;
      padding: 12px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 75%;
      margin: 0 auto;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .dish:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
    }

    .dish img {
      display: block;
      width: min(180px, 100%);
      height: 110px;
      margin: 0 auto;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid #ffe0b2;
      transition: opacity 0.3s ease;
    }

    .dish p {
      background: linear-gradient(135deg, #ff7043, #ef6c00);
      color: white;
      padding: 8px 12px;
      font-weight: 600;
      margin: 0;
      width: 100%;
      border-radius: 8px;
      letter-spacing: 0.2px;
      box-sizing: border-box;
    }

    @media (max-width: 640px) {
      .rack {
        grid-template-columns: 1fr;
      }

      .showcase-header {
        padding: 10px 14px;
        gap: 12px;
      }

      .showcase-logo {
        width: 135px;
      }

      .dish img {
        width: 100%;
        max-width: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="showcase-container">
    <div class="showcase-header">
      <img class="showcase-logo" src="Assets/Logo/Kitchen_Garpoo_GFr_V2.png" alt="Garpoo logo">
      <h2 class="showcase-title">Today's Specials</h2>
    </div>
    <div class="rack">
      <div class="rack-left">
        <div class="dish"><img src="Images/Dish 1.jpg" alt="Dish 1"><p>Dish 1</p></div>
        <div class="dish"><img src="Images/Dish 2.jpg" alt="Dish 2"><p>Dish 2</p></div>
        <div class="dish"><img src="Images/Dish 3.jpg" alt="Dish 3"><p>Dish 3</p></div>
      </div>
      <div class="rack-right">
        <div class="dish"><img src="Images/Dish 4.png" alt="Dish 4"><p>Dish 4</p></div>
        <div class="dish"><img src="Images/Dish 5.jpg" alt="Dish 5"><p>Dish 5</p></div>
        <div class="dish"><img src="Images/Dish 6.jpeg" alt="Dish 6"><p>Dish 6</p></div>
      </div>
    </div>
  </div>
</body>
</html>
